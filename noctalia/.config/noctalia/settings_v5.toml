[backdrop]
enabled = true

[bar.default]
capsule = true
center = [ "clock", "workspaces", "cat" ]
contact_shadow = true
end = [ "recorder", "tray", "notifications", "clipboard", "control-center", "session" ]
margin_edge = 0
margin_ends = 0
radius_bottom_left = -12
radius_bottom_right = -12
start = [ "launcher", "wallpaper", "media" ]

[brightness]
enable_ddcutil = true
minimum_brightness = 0.28999999351799488
sync_all_monitors = true

[desktop_widgets]
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001", "desktop-widget-0000000000000002", "desktop-widget-0000000000000003" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 0.0
    box_width = 0.0
    cx = 438.0
    cy = 716.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "fancy_audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000001.settings]
        background = false
        visualization_mode = "wave_rings"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 272.0
    box_width = 304.0
    cx = 494.0
    cy = 376.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "media_player"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        hide_when_no_media = true
        layout = "vertical"

    [desktop_widgets.widget.desktop-widget-0000000000000003]
    box_height = 224.0
    box_width = 224.0
    cx = 1584.0
    cy = 300.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "clock"

        [desktop_widgets.widget.desktop-widget-0000000000000003.settings]
        background = true
        clock_style = "analog"

[dock]
auto_hide = true
background_opacity = 0.76999998278915882
enabled = true
launcher_custom_image_colorize = true
launcher_position = "start"
magnification_scale = 1.2000000029802322
reserve_space = false
show_dots = true

[hot_corners]
enabled = true

    [hot_corners.top_right]
    action = "launcher"

[keybinds]
down = [ "Down", "Alt+j" ]
left = [ "Left", "Alt+h" ]
right = [ "Right", "Alt+l" ]
up = [ "Up", "Alt+k" ]

[location]
auto_locate = true

[lockscreen]
blurred_desktop = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[notification]
layer = "overlay"
position = "bottom_right"

[osd]
position = "bottom_right"

[plugin_settings."noctalia/screen_recorder"]
directory = "~/videos/screen_records"
filename_pattern = "recording_%Y%m%d_%H%M%S"

[plugins]
enabled = [ "noctalia/bongocat", "noctalia/screen_recorder" ]

[shell]
avatar_path = "/home/branch/pictures/wallpapers/reisen.jpg"
external_ip_enabled = true
font_family = "Adwaita Mono"
launch_apps_as_systemd_services = true
niri_overview_type_to_launch_enabled = true
password_style = "random"
polkit_agent = true
screen_time_enabled = true

    [shell.greeter_sync]
    auto_sync = false
    privilege_command = "pkexec"

    [shell.launcher]
    session_search = true

    [shell.panel]
    control_center_placement = "floating"
    launcher_position = "bottom_center"
    session_placement = "floating"
    transparency_mode = "glass"
    wallpaper_placement = "floating"

    [shell.screen_corners]
    enabled = true

    [shell.screenshot]
    confirm_region = true
    directory = "/home/branch/pictures/screenshots"
    filename_pattern = "ps%Y%M%D%H%M%S"

    [shell.shadow]
    direction = "down_right"

[theme]
community_palette = "Oxocarbon"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-rainbow"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "ghostty", "helix", "kcolorscheme", "niri", "qt" ]
    community_ids = [ "steam", "yazi", "zathura" ]

[wallpaper]
directory = "/home/branch/pictures/wallpapers"

    [wallpaper.automation]
    enabled = true
	interval_seconds = 7200

    [wallpaper.default]
    path = "/home/branch/pictures/wallpapers/yuuka_kazami.jpg"

    [wallpaper.last]
    path = "/home/branch/pictures/wallpapers/yuuka_kazami.jpg"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/branch/pictures/wallpapers/yuuka_kazami.jpg"

[widget.cat]
# this will be replaced by script in .lcoal/state/noctalia/settings.toml
input_devices = [ "/dev/input/event21" ]
scale = 1.7
type = "noctalia/bongocat:cat"

[widget.clock]
font_family = "Adwaita Mono"

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.tray]
drawer = true

[widget.workspaces]
anchor = true
